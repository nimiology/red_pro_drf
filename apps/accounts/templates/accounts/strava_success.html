<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Strava Connected | Red Pro</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Oswald:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #000000;
            --card-bg: rgba(24, 24, 24, 0.75);
            --accent-red: #D90429;
            --accent-orange: #FC642D;
            --text-main: #FFFFFF;
            --text-muted: #A0A0A0;
            --border-color: rgba(255, 255, 255, 0.08);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        .glowing-orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(120px);
            opacity: 0.15;
            z-index: 1;
            pointer-events: none;
            animation: floatOrb 10s infinite alternate ease-in-out;
        }

        .orb-red {
            width: 400px;
            height: 400px;
            background: var(--accent-red);
            top: -100px;
            left: -100px;
        }

        .orb-orange {
            width: 450px;
            height: 450px;
            background: var(--accent-orange);
            bottom: -150px;
            right: -150px;
            animation-delay: -3s;
        }

        @keyframes floatOrb {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(40px, 40px) scale(1.1); }
        }

        .container {
            position: relative;
            z-index: 2;
            width: 90%;
            max-width: 450px;
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border-color);
            border-radius: 28px;
            padding: 40px 32px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5), 
                        inset 0 1px 0 rgba(255, 255, 255, 0.05);
            animation: slideIn 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes slideIn {
            0% { opacity: 0; transform: translateY(20px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        .icon-wrapper {
            margin-bottom: 28px;
            position: relative;
            display: inline-block;
        }

        .circle-bg {
            width: 96px;
            height: 96px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(220,53,69,0.1) 0%, rgba(252,100,45,0.05) 100%);
            border: 1.5px dashed rgba(252, 100, 45, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            animation: rotateDashed 20s linear infinite;
        }

        @keyframes rotateDashed {
            100% { transform: rotate(360deg); }
        }

        .icon-success {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 72px;
            height: 72px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--accent-red) 0%, var(--accent-orange) 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 8px 24px rgba(217, 4, 41, 0.3);
            animation: scaleInCheck 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) 0.2s both;
        }

        @keyframes scaleInCheck {
            0% { transform: translate(-50%, -50%) scale(0); }
            100% { transform: translate(-50%, -50%) scale(1); }
        }

        .icon-success svg {
            width: 32px;
            height: 32px;
            fill: none;
            stroke: #FFFFFF;
            stroke-width: 3;
            stroke-linecap: round;
            stroke-linejoin: round;
            stroke-dasharray: 100;
            stroke-dashoffset: 100;
            animation: drawCheck 0.8s ease-out 0.6s forwards;
        }

        @keyframes drawCheck {
            100% { stroke-dashoffset: 0; }
        }

        h1 {
            font-family: 'Oswald', sans-serif;
            font-size: 32px;
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: uppercase;
            margin-bottom: 12px;
            background: linear-gradient(90deg, #FFFFFF 0%, #E0E0E0 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p {
            font-size: 15px;
            color: var(--text-muted);
            line-height: 1.6;
            margin-bottom: 32px;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 54px;
            border-radius: 14px;
            font-family: 'Oswald', sans-serif;
            font-size: 16px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #FFFFFF;
            background: linear-gradient(135deg, var(--accent-red) 0%, var(--accent-orange) 100%);
            border: none;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            box-shadow: 0 6px 20px rgba(217, 4, 41, 0.25);
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(217, 4, 41, 0.4);
            filter: brightness(1.1);
        }

        @media (max-width: 480px) {
            .container { padding: 32px 24px; }
            h1 { font-size: 28px; }
        }
    </style>
</head>
<body>
    <div class="glowing-orb orb-red"></div>
    <div class="glowing-orb orb-orange"></div>

    <div class="container">
        <div class="icon-wrapper">
            <div class="circle-bg"></div>
            <div class="icon-success">
                <svg viewBox="0 0 24 24">
                    <polyline points="20 6 9 17 4 12"></polyline>
                </svg>
            </div>
        </div>
        <h1>Strava Connected</h1>
        <p>Your Strava account has been successfully linked to Red Pro. You can now close this window and return to the application to sync your activities.</p>
        <button class="btn" onclick="window.close()">Close Window</button>
    </div>
</body>
</html>
